<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Struk Penjualan</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        button, input { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; }
        #result { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 5px; white-space: pre-wrap; font-size: 12px;}
        #status { color: blue; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Scan Struk Penjualan</h2>
    <input type="file" accept="image/*" capture="environment" id="fileInput">
    
    <div id="status"></div>
    <div id="result">Hasil teks akan muncul di sini...</div>
    
    <button id="sendBtn" style="display:none; background: #28a745; color: white; border: none; cursor:pointer; font-weight:bold;">Simpan ke Google Sheets</button>

    <script>
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        const sendBtn = document.getElementById('sendBtn');
        let extractedText = "";

        // URL Apps Script Anda sudah dimasukkan dengan benar
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxIYfupSS1LyrzBa6_NViZhaxmUZ_SRbqNwyIgb9NtewPu5SnsAymiI8rX4YSGk5V1ZtA/exec';

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            statusDiv.innerText = "Sedang membaca struk... Mohon tunggu.";
            statusDiv.style.color = "blue";
            resultDiv.innerText = "";
            sendBtn.style.display = "none";

            try {
                const worker = await Tesseract.createWorker('ind');
                const ret = await worker.recognize(file);
                extractedText = ret.data.text;
                
                resultDiv.innerText = extractedText;
                statusDiv.innerText = "Selesai membaca! Silakan klik tombol simpan.";
                sendBtn.style.display = "block";
                
                await worker.terminate();
            } catch (err) {
                statusDiv.innerText = "Gagal membaca struk.";
                statusDiv.style.color = "red";
                console.error(err);
            }
        });

        sendBtn.addEventListener('click', async () => {
            statusDiv.innerText = "Mengekstrak daftar item dan mengirim...";
            statusDiv.style.color = "blue";
            sendBtn.disabled = true;

            // Ekstraksi Tanggal
            const matchTanggal = extractedText.match(/(\d{4}-\d{2}-\d{2})/);
            const tanggalStruk = matchTanggal ? matchTanggal[1] : "Tidak ditemukan";

            // Ekstraksi Item
            const lines = extractedText.split('\n');
            const detectedItems = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                const matchQtyPrice = line.match(/^(\d+)\s*x\s*([\d\.,]+)/i);
                
                if (matchQtyPrice) {
                    const qty = parseInt(matchQtyPrice[1]);
                    const price = parseInt(matchQtyPrice[2].replace(/[\.,]/g, ''));
                    
                    let itemName = "Item Tanpa Nama";
                    if (i > 0) {
                        let prevLine = lines[i - 1].trim();
                        if (prevLine && !prevLine.includes('---')) {
                            itemName = prevLine;
                        }
                    }
                    
                    detectedItems.push({ name: itemName, qty: qty, price: price });
                }
            }

            const payload = { tanggal: tanggalStruk, items: detectedItems, text: extractedText };

            try {
                const response = await fetch( 'https://script.google.com/macros/s/AKfycbwfQzeFpytPEu2LxiGh-VZxdsmqdIjdPhSXFA9FYnVXNazDIICU_2QpZjagMmYoyKVR/exec', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    redirect: 'follow' // Mengatasi masalah redirect Google
                });
                
                statusDiv.innerText = `Berhasil! ${detectedItems.length} item tersimpan ke database.`;
                statusDiv.style.color = "green";
                sendBtn.style.display = "none";
                sendBtn.disabled = false;
            } catch (err) {
                console.error("Error Fetch: ", err); 
                statusDiv.innerText = "Gagal menyimpan. Coba lagi.";
                statusDiv.style.color = "red";
                sendBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
